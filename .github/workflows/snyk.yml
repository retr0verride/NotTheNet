# NotTheNet — Snyk Security Scan
# Requires SNYK_TOKEN secret set in repo settings:
#   GitHub → Settings → Secrets and variables → Actions → New repository secret
#   Name: SNYK_TOKEN  Value: <token from https://app.snyk.io/account>
name: Snyk

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]
  schedule:
    # Weekly scan on Mondays at 08:00 UTC
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write  # required to upload SARIF results

jobs:
  snyk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          # "monitor" uploads results to Snyk dashboard; use "test" for CI-only gate
          command: monitor
          args: --severity-threshold=high --file=requirements.txt

      - name: Upload Snyk SARIF to GitHub Code Scanning
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: >
            --severity-threshold=high
            --file=requirements.txt
            --sarif-file-output=snyk.sarif
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif
