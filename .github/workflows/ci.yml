# ──────────────────────────────────────────────────────────────────────────────
# NotTheNet — CI/CD Pipeline
#
# Jobs:
#   secrets     gitleaks secret scan (blocks all other jobs)
#   lint        ruff + mypy + bandit SAST + pip-audit + openapi-spec-validator
#   test        pytest + coverage gate (≥35%) across Python 3.10–3.12
#   docker      Multi-stage image build; push to GHCR on main
#   build-dist  Build sdist + wheel; emit SHA-256 hashes (tags only)
#   build-deb   Build .deb package via build-deb.sh (tags only)
#   provenance  SLSA Level 3 provenance via slsa-github-generator (tags only)
#   release     Draft GitHub Release on CalVer tags (vYYYY.MM.DD*)
#
# Required repository secrets:
#   (none — GITHUB_TOKEN provides packages:write via job permissions)
# ──────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, "release/**"]
    tags:     ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all  # baseline; individual jobs escalate only what they need

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ── Secret scanning (gitleaks) ───────────────────────────────────────────────
jobs:
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # full history for gitleaks

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ── Lint + SAST ───────────────────────────────────────────────────────────────
  lint:
    name: Lint & SAST
    runs-on: ubuntu-22.04
    needs: secrets
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install shellcheck (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run consolidated checks (single source of truth)
        # All lint/SAST logic lives in scripts/checks.py — same script local
        # devs run via predeploy.{ps1,sh}. --skip-tests because the test job
        # below runs pytest across the Python version matrix.
        run: python scripts/checks.py --skip-tests

      - name: Generate bandit SARIF for GitHub Security
        if: always()
        run: |
          pip install --quiet "bandit[toml]==1.9.4" bandit-sarif-formatter==1.1.1
          bandit -r . \
            -c pyproject.toml \
            --severity-level high \
            --format sarif \
            --output bandit-results.sarif || true

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

# ── Unit tests (matrix) ──────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime + test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==9.0.3 pytest-cov==7.1.0 pytest-timeout==2.4.0

      - name: Run tests
        run: |
          pytest tests/ \
            --tb=short \
            -q \
            --timeout=60 \
            --cov \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=45

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

# ── Docker build ──────────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-22.04
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build (PR — no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          target:  runtime
          push:    false
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push (main / tag)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          target:  runtime
          push:    true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

# ── Build distribution (for SLSA provenance) ────────────────────────────────
  build-dist:
    name: Build distribution
    runs-on: ubuntu-22.04
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        run: pip install build==1.4.0 && python -m build

      - name: Compute SHA-256 hashes
        id: hash
        run: |
          set -euo pipefail
          cd dist
          echo "hashes=$(sha256sum * | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

# ── Build .deb package ───────────────────────────────────────────────────────
  build-deb:
    name: Build .deb package
    runs-on: ubuntu-22.04
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build .deb
        run: bash build-deb.sh

      - name: Audit .deb for unresolved placeholders
        run: |
          set -euo pipefail
          DEB=$(find dist/ -name '*.deb' | head -1)
          mkdir -p /tmp/deb-extract
          dpkg-deb -R "$DEB" /tmp/deb-extract
          if grep -rn '_PLACEHOLDER' /tmp/deb-extract/; then
            echo "ERROR: Unresolved *_PLACEHOLDER strings found in the installed .deb payload."
            exit 1
          fi
          echo "OK: No unresolved placeholders in $DEB"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deb
          path: dist/*.deb

# ── SLSA provenance ───────────────────────────────────────────────────────────
  provenance:
    needs: build-dist
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: "${{ needs.build-dist.outputs.hashes }}"
      upload-assets: true

# ── Release draft ─────────────────────────────────────────────────────────────
  release:
    name: Draft release
    runs-on: ubuntu-22.04
    needs: [build-dist, provenance, build-deb]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download wheel/sdist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Download .deb artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: deb
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          draft: true
          name: NotTheNet ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
