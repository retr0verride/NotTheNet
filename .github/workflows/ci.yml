# NotTheNet — CI Pipeline
# Mirrors predeploy.sh: lint → type-check → security scan → tests → build
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy bandit pytest build

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy notthenet.py services/ network/ utils/

      - name: Security scan (bandit)
        run: bandit -c pyproject.toml -r notthenet.py services/ network/ utils/

      - name: Tests (pytest)
        run: python -m pytest tests/ -v

      - name: Build package
        run: python -m build --outdir dist/
