# NotTheNet — Software Composition Analysis
# Runs pip-audit (PyPA) and Trivy (Aqua) on every push to main/dev.
# No tokens or accounts required — both tools use public vulnerability DBs.
name: SCA

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Tuesdays at 08:00 UTC (offset from Snyk Monday scan)
    - cron: "0 8 * * 2"

permissions:
  contents: read
  security-events: write  # required to upload SARIF results

jobs:
  pip-audit:
    name: pip-audit (PyPA)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit \
            --requirement requirements.txt \
            --format json \
            --output pip-audit-results.json \
            --skip-editable
        continue-on-error: true

      - name: Upload pip-audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit-results.json

  trivy:
    name: Trivy (Aqua)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"   # don't fail the job; treat as informational

      - name: Upload Trivy SARIF to GitHub Code Scanning
        if: hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy
