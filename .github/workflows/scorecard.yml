# NotTheNet — OpenSSF Scorecard
# Runs the OSSF Scorecard action to evaluate supply-chain security posture.
# Results are uploaded to GitHub Code Scanning (SARIF) and the badge is served
# by securityscorecards.dev.
name: Scorecard

on:
  push:
    branches: [main]
  schedule:
    # Weekly on Thursdays at 08:00 UTC
    - cron: "0 8 * * 4"

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # upload SARIF
      id-token: write         # publish results

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: results.sarif
