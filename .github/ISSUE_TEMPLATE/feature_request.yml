name: Feature Request
description: Suggest a new service, capability, or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please describe your feature request clearly and concisely.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use-case or gap this feature addresses.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you'd like it to work. Include API/config changes if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought of, and why you ruled them out.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      multiple: true
      options:
        - New protocol service
        - Existing service enhancement
        - Network / iptables
        - Configuration
        - Logging / observability
        - GUI
        - CLI / headless
        - Health API
        - Security hardening
        - Documentation
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: This feature does not introduce a security regression
          required: true
