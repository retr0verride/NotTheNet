<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- NotTheNet app icon: stylised network node with a slash indicating "not the internet" -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2d6a9f"/>
      <stop offset="100%" stop-color="#0d1f33"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)" stroke="#4a90d9" stroke-width="3"/>

  <!-- Central node -->
  <circle cx="64" cy="64" r="10" fill="#a8d4f5" stroke="#ffffff" stroke-width="2"/>

  <!-- Spoke nodes (N, E, S, W) -->
  <circle cx="64" cy="24" r="7" fill="#4a90d9" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="104" cy="64" r="7" fill="#4a90d9" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="64" cy="104" r="7" fill="#4a90d9" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="24" cy="64" r="7" fill="#4a90d9" stroke="#ffffff" stroke-width="1.5"/>

  <!-- Spoke lines -->
  <line x1="64" y1="53" x2="64" y2="31" stroke="#a8d4f5" stroke-width="2"/>
  <line x1="74" y1="64" x2="97" y2="64" stroke="#a8d4f5" stroke-width="2"/>
  <line x1="64" y1="75" x2="64" y2="97" stroke="#a8d4f5" stroke-width="2"/>
  <line x1="53" y1="64" x2="31" y2="64" stroke="#a8d4f5" stroke-width="2"/>

  <!-- "Not" slash — red diagonal bar -->
  <line x1="34" y1="34" x2="94" y2="94" stroke="#e05252" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
</svg>
